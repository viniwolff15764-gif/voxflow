<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- WIDGET: dot when idle, bar when recording -->
  <div id="pill" class="pill idle">
    <button class="orb" id="orb" title="Configurações">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </button>
    <div class="center">
      <div class="wave" id="wave"></div>
      <span class="status" id="status"></span>
    </div>
  </div>

  <!-- SETTINGS -->
  <div id="settings" class="settings hidden">
    <div class="settings-header">
      <span>Configurações</span>
      <button class="icon-btn" id="btn-back" title="Voltar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="field">
        <label>Groq API Key <a class="link" id="link-groq" href="#">criar grátis</a></label>
        <input type="password" id="api-key" placeholder="gsk_...">
      </div>
      <div class="field">
        <label>Atalho</label>
        <select id="hotkey">
          <option value="F9">F9</option>
          <option value="F8">F8</option>
          <option value="F7">F7</option>
          <option value="F6">F6</option>
          <option value="F10">F10</option>
          <option value="Ctrl+Alt+Space">⌃ Control + ⌥ Option + Espaço</option>
          <option value="Ctrl+Shift+Space">⌃ Control + ⇧ Shift + Espaço</option>
          <option value="Ctrl+Shift+D">⌃ Control + ⇧ Shift + D</option>
          <option value="Cmd+Shift+Space">⌘ Command + ⇧ Shift + Espaço</option>
          <option value="Cmd+Shift+D">⌘ Command + ⇧ Shift + D</option>
          <option value="Cmd+Ctrl+Space">⌘ Command + ⌃ Control + Espaço</option>
        </select>
        <span class="hint-sm">No Mac, teclas F podem precisar do Fn. Combinações com ⌘/⌃ são mais confiáveis.</span>
      </div>
      <div class="field">
        <label>Modo do atalho</label>
        <select id="hold-mode">
          <option value="hold">Segurar para falar</option>
          <option value="toggle">Apertar p/ começar e parar</option>
        </select>
      </div>
      <div class="field">
        <label>Qualidade da transcrição</label>
        <select id="whisper-model">
          <option value="whisper-large-v3-turbo">Rápida (turbo)</option>
          <option value="whisper-large-v3">Máxima precisão</option>
        </select>
      </div>
      <div class="field">
        <label>Idioma</label>
        <select id="language">
          <option value="pt">Português (BR)</option>
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>
      <div class="field toggle">
        <input type="checkbox" id="auto-paste" checked>
        <label for="auto-paste">Colar o texto automaticamente</label>
      </div>
      <div class="section-title">Modo comando</div>
      <div class="field toggle">
        <input type="checkbox" id="command-mode">
        <label for="command-mode">Reescrever texto selecionado por voz</label>
      </div>
      <div class="field">
        <label>Palavra-gatilho</label>
        <input type="text" id="command-prefix" value="comando">
      </div>
      <div class="field">
        <label>Modelo de IA (comandos)</label>
        <select id="llm-model">
          <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
          <option value="gemma2-9b-it">Gemma 2 9B</option>
        </select>
      </div>
      <button class="btn-save" id="btn-save">Salvar</button>
      <div class="save-msg" id="save-msg"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
