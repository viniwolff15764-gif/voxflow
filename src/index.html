<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="widget" class="widget idle" data-tauri-drag-region>
    <div class="mic-dot"></div>
    <div class="text-display" id="text-area">
      <span class="placeholder">Ctrl+Win+Space</span>
    </div>
    <span class="hotkey-badge" id="hotkey-display">Ctrl+Win+Space</span>
    <button class="btn-settings" id="btn-settings" title="Configurações">⚙</button>
    <button class="btn-close" id="btn-close" title="Fechar">✕</button>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
