<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoxFlow</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="widget" class="widget idle">
    <div class="titlebar" data-tauri-drag-region>
      <div class="titlebar-left" data-tauri-drag-region>
        <div class="mic-icon"></div>
        <span>VoxFlow</span>
      </div>
      <div class="titlebar-buttons">
        <button class="titlebar-btn" id="btn-minimize">─</button>
        <button class="titlebar-btn close" id="btn-close">✕</button>
      </div>
    </div>

    <div class="text-area" id="text-area">
      <span class="placeholder">Segure a tecla e fale...</span>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="status-bar">
      <button class="settings-btn" id="btn-settings" title="Configurações">⚙️</button>
      <span><span class="hotkey" id="hotkey-display">CapsLock</span> <span id="status-text">segure para ditar</span></span>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
